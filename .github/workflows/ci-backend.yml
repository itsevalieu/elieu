name: CI — Backend

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  detect_changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      portfolio_api: ${{ steps.filter.outputs.portfolio_api }}
      newsletter_api: ${{ steps.filter.outputs.newsletter_api }}
      backend_common: ${{ steps.filter.outputs.backend_common }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            portfolio_api:
              - 'backend/portfolio-api/**'
            newsletter_api:
              - 'backend/newsletter-api/**'
            backend_common:
              - 'backend/common/**'

  test:
    name: Backend Tests
    needs: detect_changes
    if: >
      needs.detect_changes.outputs.portfolio_api == 'true' ||
      needs.detect_changes.outputs.newsletter_api == 'true' ||
      needs.detect_changes.outputs.backend_common == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Test portfolio API
        if: >
          needs.detect_changes.outputs.portfolio_api == 'true' ||
          needs.detect_changes.outputs.backend_common == 'true'
        run: |
          cd backend/portfolio-api
          ./gradlew test

      - name: Test newsletter API
        if: >
          needs.detect_changes.outputs.newsletter_api == 'true' ||
          needs.detect_changes.outputs.backend_common == 'true'
        run: |
          cd backend/newsletter-api
          ./gradlew test

