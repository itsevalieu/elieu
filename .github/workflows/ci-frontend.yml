name: CI — Frontend

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  detect_changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      portfolio: ${{ steps.filter.outputs.portfolio }}
      newsletter: ${{ steps.filter.outputs.newsletter }}
      frontend_common: ${{ steps.filter.outputs.frontend_common }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            portfolio:
              - 'frontend/portfolio/**'
            newsletter:
              - 'frontend/newsletter/**'
            frontend_common:
              - 'frontend/common/**'

  lint_and_build:
    name: Lint & Build
    needs: detect_changes
    if: >
      needs.detect_changes.outputs.portfolio == 'true' ||
      needs.detect_changes.outputs.newsletter == 'true' ||
      needs.detect_changes.outputs.frontend_common == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint portfolio
        if: >
          needs.detect_changes.outputs.portfolio == 'true' ||
          needs.detect_changes.outputs.frontend_common == 'true'
        run: npx turbo lint --filter=@evalieu/portfolio

      - name: Build portfolio
        if: >
          needs.detect_changes.outputs.portfolio == 'true' ||
          needs.detect_changes.outputs.frontend_common == 'true'
        run: npx turbo build --filter=@evalieu/portfolio

      - name: Lint newsletter
        if: >
          needs.detect_changes.outputs.newsletter == 'true' ||
          needs.detect_changes.outputs.frontend_common == 'true'
        run: npx turbo lint --filter=@evalieu/newsletter

      - name: Build newsletter
        if: >
          needs.detect_changes.outputs.newsletter == 'true' ||
          needs.detect_changes.outputs.frontend_common == 'true'
        run: npx turbo build --filter=@evalieu/newsletter

