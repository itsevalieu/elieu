spring.application.name=newsletter-api
server.port=8081

spring.jpa.open-in-view=false
spring.jackson.serialization.write-dates-as-timestamps=false

jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
jwt.secure-cookie=false

aws.s3.bucket=replace-me
# Optional dedicated bucket for game uploads; when empty, uses aws.s3.bucket
aws.s3.games-bucket=
aws.s3.region=

aws.ses.region=

aws.ses.from-email=newsletter@evalieu.com
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

app.newsletter.public-base-url=https://newsletter.evalieu.com
