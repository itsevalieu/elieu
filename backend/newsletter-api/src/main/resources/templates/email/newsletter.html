<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${publicationName}">Newsletter</title>
</head>
<body style="margin:0;padding:0;background-color:#fafafa;font-family:Georgia,'Times New Roman',serif;color:#18181b;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#fafafa;padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;background:#ffffff;border-radius:8px;border:1px solid #e4e4e7;">
          <tr>
            <td style="padding:24px 24px 8px 24px;border-bottom:2px solid #18181b;">
              <p style="margin:0 0 4px 0;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:#71717a;">New issue</p>
              <h1 style="margin:0;font-size:22px;line-height:1.3;" th:text="${publicationName}">Publication</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 24px 8px 24px;font-size:16px;line-height:1.65;color:#3f3f46;">
              <div th:utext="${innerContentHtml}">Content</div>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 24px 24px 24px;">
              <p style="margin:0 0 12px 0;font-size:14px;">
                <a th:href="${viewInBrowserUrl}" style="color:#2563eb;">View in browser</a>
              </p>
              <hr style="border:none;border-top:1px solid #e4e4e7;margin:0 0 12px 0;" />
              <p style="margin:0;font-size:12px;line-height:1.5;color:#71717a;">
                <a th:href="${unsubscribeUrl}" style="color:#71717a;">Unsubscribe</a>
                &nbsp;·&nbsp;
                You received this because you confirmed your subscription.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
