services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: evalieu_dev
      POSTGRES_USER: evalieu
      POSTGRES_PASSWORD: evalieu
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evalieu -d evalieu_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

  newsletter-api:
    build: ./backend/newsletter-api
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/evalieu_dev
      SPRING_DATASOURCE_USERNAME: evalieu
      SPRING_DATASOURCE_PASSWORD: evalieu
      SERVER_PORT: "8081"
      JWT_SECRET: evalieu-local-dev-jwt-secret-change-in-production-minimum-32-chars
      AWS_S3_BUCKET: evalieu-dev-media
      AWS_REGION: us-east-1
    depends_on:
      postgres:
        condition: service_healthy

  portfolio-api:
    build: ./backend/portfolio-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/evalieu_dev
      SPRING_DATASOURCE_USERNAME: evalieu
      SPRING_DATASOURCE_PASSWORD: evalieu
      SERVER_PORT: "8080"
      JWT_SECRET: evalieu-local-dev-jwt-secret-change-in-production-minimum-32-chars
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
